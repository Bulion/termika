<!doctype html>

<html lang="pl" dir="ltr">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<title>Termika - skuteczna nauka teorii lotniczej do licencji SPL</title>
		<meta
			name="description"
			content="Termika to otwarta aplikacja do nauki teorii lotniczej do licencji szybowcowej SPL: fiszki z powtórkami, ćwiczenia na czas, komputer E6B i symulacja egzaminu z oficjalnej bazy pytań ULC. Działa offline, po polsku i po angielsku."
		/>
		<meta name="robots" content="index, follow" />
		<meta name="application-name" content="Termika" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#4fb6e8" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121a2b" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Termika" />
		<meta property="og:title" content="Termika - nauka teorii lotniczej do licencji SPL" />
		<meta
			property="og:description"
			content="Fiszki z powtórkami, ćwiczenia na czas, komputer E6B i symulacja egzaminu ULC. Naucz się teorii szybowcowej skutecznie - offline i bez kont."
		/>
		<meta property="og:locale" content="pl_PL" />
		<meta property="og:locale:alternate" content="en_GB" />
		<meta property="og:image" content="%sveltekit.assets%/termika-hero.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="%sveltekit.assets%/termika-hero.png" />

		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebApplication",
				"name": "Termika",
				"applicationCategory": "EducationalApplication",
				"operatingSystem": "Web (PWA)",
				"description": "Otwarta aplikacja do nauki teorii lotniczej do licencji szybowcowej SPL: fiszki z powtórkami, ćwiczenia na czas, komputer E6B i symulacja egzaminu ULC.",
				"inLanguage": ["pl", "en"],
				"isAccessibleForFree": true,
				"offers": { "@type": "Offer", "price": "0", "priceCurrency": "PLN" },
				"license": "https://www.gnu.org/licenses/gpl-3.0.html"
			}
		</script>

		<meta name="text-scale" content="scale" />
		<script>
			try {
				const pref = localStorage.getItem('termika-theme');
				const dark =
					pref === 'dark' ||
					(pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (dark) document.documentElement.dataset.theme = 'dark';
			} catch (error) {
				void error;
			}
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
